<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Dịch</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }

    h2 {
      text-align: center;
    }

    label,
    input,
    button {
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      margin-top: 4px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    button,
    .button-wrapper {
      padding: 8px 16px;
      cursor: pointer;
      text-align: center;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 4px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <h2>Dịch</h2>

  <input id="inputText" type="text" placeholder="Ví dụ: số điện thoại, email..." />

  <div style="text-align: center; margin: 8px 0 16px;">
    <button id="calcButton" type="button">Tính kết quả</button>
  </div>

  <h3>Kết quả</h3>
  <pre id="result">Chưa có kết quả.</pre>

  <script src="dich.js"></script>
  <script>
    function hienThiKetQua() {
      var inputEl = document.getElementById("inputText");
      var resultEl = document.getElementById("result");
      var text = inputEl.value || "";

      if (typeof dich !== "function") {
        resultEl.textContent = "Không tìm thấy hàm dich(). Kiểm tra lại file dich.js.";
        return;
      }

      var kq = dich(text);
      resultEl.textContent = JSON.stringify(kq, null, 2);
    }

    document
      .getElementById("calcButton")
      .addEventListener("click", hienThiKetQua);

    document
      .getElementById("inputText")
      .addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          hienThiKetQua();
        }
    });
  </script>
</body>
</html>
